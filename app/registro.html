<!doctype html>
<html lang="es-CO">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Crea tu cuenta en URBANA, tu tienda de moda.">
  <title>URBANA – Crear Cuenta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body class="bg-light d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">
        <i class="bi bi-bag-heart-fill text-warning me-2"></i>URBANA
      </a>
      <a href="../index.html" class="btn btn-outline-light btn-sm">
        <i class="bi bi-house-fill me-1"></i>Volver al inicio
      </a>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7">
          <div class="card border-0 shadow">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <i class="bi bi-bag-check-fill text-warning display-4"></i>
                <h3 class="fw-bold mt-2 mb-1">Crea tu cuenta</h3>
                <p class="text-muted">Regístrate y descubre las últimas colecciones de URBANA</p>
              </div>

              <form>
                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="text" class="form-control" id="regNombre" placeholder="Tu nombre" required />
                      <label for="regNombre"><i class="bi bi-person me-1"></i>Nombre</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="text" class="form-control" id="regApellido" placeholder="Tu apellido"
                        required />
                      <label for="regApellido"><i class="bi bi-person me-1"></i>Apellido</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="email" class="form-control" id="regCorreo" placeholder="correo@ejemplo.com"
                        required />
                      <label for="regCorreo"><i class="bi bi-envelope me-1"></i>Correo electrónico</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="tel" class="form-control" id="regTelefono" placeholder="Teléfono" required />
                      <label for="regTelefono"><i class="bi bi-telephone me-1"></i>Teléfono</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="password" class="form-control" id="regPassword" placeholder="Contraseña"
                        required />
                      <label for="regPassword"><i class="bi bi-lock me-1"></i>Contraseña</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="password" class="form-control" id="regPasswordConfirm"
                        placeholder="Confirmar contraseña" required />
                      <label for="regPasswordConfirm"><i class="bi bi-lock-fill me-1"></i>Confirmar contraseña</label>
                    </div>
                  </div>
                  <div class="col-12">
                    <label class="form-label"><i class="bi bi-person-vcard me-1"></i>Género</label>
                    <div class="dropdown">
                      <button class="btn btn-outline-secondary w-100 text-start dropdown-toggle" type="button"
                        id="regGeneroBtn" data-bs-toggle="dropdown" aria-expanded="false">
                        Prefiero no decirlo
                      </button>
                      <ul class="dropdown-menu w-100" aria-labelledby="regGeneroBtn">
                        <li><a class="dropdown-item" href="#" data-value="Prefiero no decirlo">Prefiero no
                            decirlo</a></li>
                        <li><a class="dropdown-item" href="#" data-value="Mujer">Mujer</a></li>
                        <li><a class="dropdown-item" href="#" data-value="Hombre">Hombre</a></li>
                        <li><a class="dropdown-item" href="#" data-value="Otro">Otro</a></li>
                      </ul>
                      <input type="hidden" id="regGenero" name="regGenero" value="Prefiero no decirlo" />
                    </div>
                  </div>
                </div>

                <div class="form-check my-4">
                  <input class="form-check-input" type="checkbox" id="regTerminos" required />
                  <label class="form-check-label" for="regTerminos">
                    Acepto los <a href="#" class="text-decoration-none fw-semibold">términos y condiciones</a> y la
                    <a href="#" class="text-decoration-none fw-semibold">política de privacidad</a>
                  </label>
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-dark btn-lg">
                    <i class="bi bi-person-check-fill me-2"></i>Crear cuenta
                  </button>
                </div>
              </form>

              <hr class="my-4" />

              <p class="text-center mb-0">
                ¿Ya tienes cuenta?
                <a href="login.html" class="fw-bold text-decoration-none">Inicia sesión aquí</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-dark text-light py-4">
    <div class="container text-center">
      <p class="mb-2 small">&copy; 2026 URBANA. Todos los derechos reservados.</p>
      <a href="../index.html" class="btn btn-outline-warning btn-sm">
        <i class="bi bi-house-fill me-1"></i>Volver al inicio
      </a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll('#regGeneroBtn ~ .dropdown-menu .dropdown-item').forEach(function (item) {
      item.addEventListener('click', function (e) {
        e.preventDefault();
        var value = this.getAttribute('data-value');
        document.getElementById('regGeneroBtn').textContent = value;
        document.getElementById('regGenero').value = value;
      });
    });
  </script>

</body>

</html>
