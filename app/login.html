<!doctype html>
<html lang="es-CO">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Inicia sesión en tu cuenta de URBANA, tu tienda de moda.">
  <title>URBANA – Iniciar Sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body class="bg-light d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">
        <i class="bi bi-bag-heart-fill text-warning me-2"></i>URBANA
      </a>
      <a href="../index.html" class="btn btn-outline-light btn-sm">
        <i class="bi bi-house-fill me-1"></i>Volver al inicio
      </a>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
          <div class="card border-0 shadow">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <i class="bi bi-bag-heart-fill text-warning display-4"></i>
                <h3 class="fw-bold mt-2 mb-1">Bienvenido de nuevo</h3>
                <p class="text-muted">Inicia sesión para seguir tus pedidos y colecciones</p>
              </div>

              <form>
                <div class="form-floating mb-3">
                  <input type="email" class="form-control" id="loginCorreo" placeholder="correo@ejemplo.com"
                    required />
                  <label for="loginCorreo"><i class="bi bi-envelope me-1"></i>Correo electrónico</label>
                </div>
                <div class="form-floating mb-3">
                  <input type="password" class="form-control" id="loginPassword" placeholder="Contraseña"
                    required />
                  <label for="loginPassword"><i class="bi bi-lock me-1"></i>Contraseña</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="recordarSesion" />
                    <label class="form-check-label" for="recordarSesion">Recordarme</label>
                  </div>
                  <a href="recuperar.html" class="text-decoration-none fw-semibold">
                    <i class="bi bi-question-circle me-1"></i>¿Olvidaste tu contraseña?
                  </a>
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-dark btn-lg">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
                  </button>
                </div>
              </form>

              <hr class="my-4" />

              <p class="text-center mb-0">
                ¿Aún no tienes cuenta?
                <a href="registro.html" class="fw-bold text-decoration-none">Regístrate aquí</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-dark text-light py-4">
    <div class="container text-center">
      <p class="mb-2 small">&copy; 2026 URBANA. Todos los derechos reservados.</p>
      <a href="../index.html" class="btn btn-outline-warning btn-sm">
        <i class="bi bi-house-fill me-1"></i>Volver al inicio
      </a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
